<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Contato - Coromandel</title>
  <link rel="stylesheet" href="../css/style.css">
  <script defer src="../script/script.js"></script>
</head>
<body class="contact-page">

  <header>
    <h1>Contato - Coromandel</h1>
    <nav>
      <ul>
        <li><a href="pagina1.html">Início</a></li>
        <li><a href="pagina2.html">Pontos Turísticos</a></li>
        <li><a href="pagina3.html">Curiosidades</a></li>
        <li><a href="pagina4.html" class="active">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2>Entre em contato</h2>

    <form id="contactForm">
      <div id="form-message" style="display: none;"></div>

      <label>
        Nome:
        <input type="text" id="nome" required>
      </label>

      <label>
        Email:
        <input type="email" id="email" required>
      </label>

      <label>
        Mensagem:
        <textarea id="mensagem" required></textarea>
      </label>

      <button type="submit">Enviar</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Guia Turístico - Coromandel / Lucas Fernandes</p>
  </footer>
  
</body>
</html>
